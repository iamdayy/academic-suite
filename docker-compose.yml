services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: academic_suite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academic_suite"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_POSTGRES_PRISMA_URL: postgresql://postgres:password@db:5432/academic_suite?schema=public
      DIRECT_POSTGRES_URL: postgresql://postgres:password@db:5432/academic_suite?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecretjwt}
      FRONTEND_URL: ${SERVICE_URL_WEB:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${SERVICE_URL_API:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
